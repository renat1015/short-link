version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: short-link-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/config/nginx.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html
    depends_on:
      - php-fpm
    networks:
      - short-link-network

  php-fpm:
    build: .
    container_name: short-link-php
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      COOKIE_VALIDATION_KEY: ${COOKIE_VALIDATION_KEY}
    networks:
      - short-link-network

  mysql:
    image: mariadb:12.2
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - short-link-network
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:

networks:
  short-link-network:
    driver: bridge